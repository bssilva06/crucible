phase0:
  default_provider: gmicloud
  providers:
    gmicloud:
      enabled: true
      model: seedream-5.0-lite
      api_key_env: GMICLOUD_API_KEY
      fallback_only: false
    replicate:
      enabled: true
      model: black-forest-labs/flux-schnell
      api_key_env: REPLICATE_API_TOKEN
      fallback_only: false

phase2:
  fanout:
    default_candidate_count: 2
    max_candidate_count: 8
    providers:
      - gmicloud
      - replicate
