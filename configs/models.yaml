phase0:
  default_provider: gmicloud
  providers:
    gmicloud:
      enabled: true
      model: seedream-5.0-lite
      api_key_env: GMICLOUD_API_KEY
      fallback_only: false
    replicate:
      enabled: false
      model: black-forest-labs/flux-schnell
      api_key_env: REPLICATE_API_TOKEN
      fallback_only: false
