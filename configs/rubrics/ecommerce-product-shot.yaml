criteria:
  - id: file_integrity
    description: Asset bytes decode as an image.
    type: file_integrity
    weight: 1.0
    hard_gate: true
    evaluator: deterministic

  - id: minimum_resolution
    description: Image is at least 512x512 pixels.
    type: resolution
    weight: 1.0
    hard_gate: true
    evaluator: deterministic
    expected:
      min_width: 512
      min_height: 512

  - id: aspect_ratio
    description: Image aspect ratio is square.
    type: aspect_ratio
    weight: 1.0
    hard_gate: true
    evaluator: deterministic
    expected:
      ratio: 1.0
      tolerance: 0.02

  - id: white_background_edges
    description: Image edges are sufficiently close to white.
    type: pixel_background_check
    weight: 1.0
    hard_gate: true
    evaluator: deterministic
    expected:
      edge_pass_rate: 0.95
      rgb_tolerance: 18

  - id: product_centered
    description: The main product is centered in the frame.
    type: vlm_boolean
    weight: 1.0
    hard_gate: true
    evaluator: gemini-2.5-flash
    expected: true

  - id: product_fully_visible
    description: The product is fully visible and not cropped by the image edges.
    type: vlm_boolean
    weight: 1.0
    hard_gate: true
    evaluator: gemini-2.5-flash
    expected: true

  - id: no_text_or_logos
    description: The image contains no visible text, logos, labels, or watermarks.
    type: vlm_boolean
    weight: 1.0
    hard_gate: true
    evaluator: gemini-2.5-flash
    expected: true

  - id: no_hands_people_or_props
    description: The image contains no hands, people, extra props, or distracting objects.
    type: vlm_boolean
    weight: 1.0
    hard_gate: true
    evaluator: gemini-2.5-flash
    expected: true

  - id: matches_brief_intent
    description: The image matches the user's e-commerce product-shot brief.
    type: vlm_boolean
    weight: 1.0
    hard_gate: true
    evaluator: gemini-2.5-flash
    expected: true
